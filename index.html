<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习笔记</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>

<body>
    <div class="home-container">
        <div class="deco-dot dot1"></div>
        <div class="deco-dot dot2"></div>
        <div class="home-content">
            <h1 class="home-title">📖 学习资料仓库</h1>
            <p class="home-subtitle">选择科目，开始学习</p>

            <!-- 登录区域（未登录时显示） -->
            <div id="login-area" class="login-box">
                <h2>🔐 登录</h2>
                <p class="sub">请输入您的用户名</p>
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="你的用户名" required autofocus />
                    <div class="login-actions">
                        <button type="submit" class="login-btn">登录</button>
                        <button type="button" id="register-btn" class="register-btn">注册</button>
                    </div>
                    <div id="login-error" class="login-error"></div>
                </form>
                <div class="login-info">💡 新注册用户默认无权限</div>
            </div>

            <!-- 科目卡片（登录后显示） -->
            <div id="subject-cards-wrapper" class="subject-cards-wrapper">
                <!-- 退出登录按钮（放在科目卡片上方） -->
                <button id="logout-btn" class="logout-btn-primary">
                    <i class="fas fa-sign-out-alt"></i> 退出登录
                </button>
                <!-- 滚动容器 -->
                <div class="subject-cards-scroll" id="subject-cards-scroll">
                    <div class="subject-cards" id="subject-cards-container">
                        <!-- 由 home.js 动态渲染 -->
                    </div>
                </div>
            </div>

            <footer class="home-footer"><span>✨ 从全新角度理解高中知识 ✨</span></footer>
        </div>
    </div>

    <!-- 引入 Supabase 和业务逻辑 -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
            }
        }
    </script>
    <script type="module" src="js/home.js"></script>
</body>

</html>
