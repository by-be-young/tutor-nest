<!-- admin.html -->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理员 · 学习笔记</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>

<body>
    <div class="admin-container">
        <!-- 导航栏 -->
        <nav class="admin-nav">
            <div class="admin-nav-left">
                <span class="admin-brand">🔐 管理员</span>
                <span class="admin-current-student" id="admin-current-student">未选择</span>
            </div>
            <div class="admin-nav-right">
                <select id="admin-student-select" aria-label="切换学生">
                    <option value="">-- 切换学生 --</option>
                </select>
                <button id="admin-add-student-btn" class="admin-btn"><i class="fas fa-user-plus"></i> 新增</button>
                <button id="admin-save-btn" class="admin-btn admin-btn-save" disabled><i class="fas fa-save"></i>
                    已保存</button>
                <button id="admin-logout-btn" class="admin-btn admin-btn-logout"><i class="fas fa-sign-out-alt"></i>
                    退出</button>
            </div>
        </nav>

        <!-- 主体 -->
        <main class="admin-main">
            <h2 class="admin-title">权限管理 — <span id="admin-student-name">选择学生</span></h2>

            <!-- 新增：科目选择器 -->
            <div class="admin-subject-selector">
                <label for="admin-subject-select"><i class="fas fa-book"></i> 选择科目：</label>
                <select id="admin-subject-select" aria-label="选择科目">
                    <option value="">-- 请选择科目 --</option>
                </select>
            </div>

            <div id="admin-permission-tree" class="admin-tree">
                <!-- 树状列表由 js 生成 -->
                <p class="tree-placeholder">请先选择学生和科目</p>
            </div>
            <div class="admin-tip">
                <i class="fas fa-info-circle"></i> 勾选文章即授权该学生访问，取消勾选则禁止。修改后请点击「保存」。
            </div>
        </main>
    </div>

    <!-- 引入 Supabase 和业务逻辑 (使用 module) -->
    <script type="module" src="js/admin.js"></script>
</body>

</html>
